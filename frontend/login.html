<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insightz Portal</title>
    <meta name="description" content="Insightz Portal - Secure login and registration for the document intelligence platform.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error-color: #f87171;
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 360px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 50px rgba(99, 102, 241, 0.1);
            animation: fadeIn 0.6s ease-out;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px;
            background: linear-gradient(to right, #a5b4fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(148, 163, 184, 0.6);
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        .toggle {
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .toggle:hover {
            color: var(--primary);
        }

        .error {
            color: var(--error-color);
            margin-top: 16px;
            font-size: 0.85rem;
            min-height: 20px;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Insightz Portal</h1>
    <div class="subtitle">Document Intelligence Platform</div>
    
    <div id="loginForm">
        <input type="text" id="l_user" placeholder="Username">
        <input type="password" id="l_pass" placeholder="Password">
        <button onclick="login()">Sign In</button>
        <div class="toggle" onclick="toggleMode()">New here? Create Account</div>
    </div>

    <div id="signupForm" class="hidden">
        <input type="text" id="s_user" placeholder="Choose Username">
        <input type="password" id="s_pass" placeholder="Choose Password">
        <button onclick="signup()">Create Account</button>
        <div class="toggle" onclick="toggleMode()">Have an account? Sign In</div>
    </div>

    <div id="msg" class="error"></div>
</div>

<script>
    const API = window.INSIGHTZ_API_BASE || window.location.origin; // Configurable via window.INSIGHTZ_API_BASE

    function toggleMode() {
        document.getElementById("loginForm").classList.toggle("hidden");
        document.getElementById("signupForm").classList.toggle("hidden");
        document.getElementById("msg").innerText = "";
    }

    function validateInput(u, p) {
        if (!u || !p) {
            showMsg("Fill all fields");
            return false;
        }
        if (u.length < 3 || u.length > 32) {
            showMsg("Username must be between 3 and 32 characters.");
            return false;
        }
        if (!/^[a-zA-Z0-9_-]+$/.test(u)) {
            showMsg("Username can only contain letters, numbers, underscores, and hyphens.");
            return false;
        }
        if (p.length < 8 || p.length > 72) {
            showMsg("Password must be between 8 and 72 characters.");
            return false;
        }
        return true;
    }

    async function handleResponseError(res, data) {
        if (!res.ok) {
            let errorMsg = data.detail;
            if (Array.isArray(data.detail)) {
                // Format FastAPI 422 ValidationError list
                errorMsg = data.detail.map(err => {
                    const field = err.loc[err.loc.length - 1];
                    return `${field}: ${err.msg}`;
                }).join(", ");
            }
            throw new Error(errorMsg || "An error occurred.");
        }
    }

    async function signup() {
        const u = document.getElementById("s_user").value.trim();
        const p = document.getElementById("s_pass").value;
        if (!validateInput(u, p)) return;

        try {
            const res = await fetch(`${API}/signup`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            await handleResponseError(res, data);
            
            showMsg("Success! Please login now.", "green");
            setTimeout(toggleMode, 1500);
        } catch(e) { showMsg(e.message); }
    }

    async function login() {
        const u = document.getElementById("l_user").value.trim();
        const p = document.getElementById("l_pass").value;
        if (!validateInput(u, p)) return;

        try {
            const res = await fetch(`${API}/login`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            await handleResponseError(res, data);

            // SAVE TOKEN AND REDIRECT
            localStorage.setItem("ranger_token", data.token);
            localStorage.setItem("ranger_user", data.username);
            window.location.href = "index.html"; 
        } catch(e) { showMsg(e.message); }
    }

    function showMsg(txt, color="#e74c3c") {
        const m = document.getElementById("msg");
        m.innerText = txt;
        m.style.color = color;
    }
</script>

</body>
</html>
